<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Богослужения | Храм Покрова Пресвятой Богородицы</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<header>...</header> <!-- скопируйте header из gallery.html -->
<main>
  <div class="container" style="max-width:1000px; margin:2rem auto;">
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> На главную</a>
    <h1>Богослужения</h1>
    <div id="scheduleContainer" class="schedule-list"></div>
    <p style="margin-top:2rem;">Расписание обновляется еженедельно. Уточняйте по телефону: +3751716 5-91-44</p>
  </div>
</main>
<footer>...</footer>
<button class="back-to-top" id="backToTop">↑</button>
<script src="js/common.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    await loadCommonData();
    const upcoming = getUpcomingSchedule();
    const scheduleContainer = document.getElementById('scheduleContainer');
    scheduleContainer.innerHTML = upcoming.map(i => `<div class="schedule-item"><span class="schedule-date">${escapeHtml(getFormattedScheduleItem(i))}</span><span>${escapeHtml(i.desc)}</span></div>`).join('') || '<div class="schedule-item">Нет запланированных богослужений</div>';
    initScrollAnimation();
  });
</script>
</body>
</html>
