<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Чтение | Храм Покрова Пресвятой Богородицы</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<header>...</header>
<main>
  <div class="container" style="max-width:1000px; margin:2rem auto;">
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> На главную</a>
    <h1>Полезное чтение</h1>
    <div class="articles-grid" id="articlesGrid"></div>
  </div>
</main>
<footer>...</footer>
<button class="back-to-top" id="backToTop">↑</button>
<script src="js/common.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    await loadCommonData();
    const articlesGrid = document.getElementById('articlesGrid');
    if (articles.length) {
      let html = '';
      articles.forEach(article => {
        html += `<div class="article-card" data-id="${article.id}"><i class="fas fa-book-open"></i><h3>${escapeHtml(article.title)}</h3><p>${escapeHtml(article.content.substring(0,100))}...</p><span class="read-more">Читать →</span></div>`;
      });
      articlesGrid.innerHTML = html;
      document.querySelectorAll('.article-card').forEach(card => {
        card.addEventListener('click', () => {
          window.location.href = `article.html?id=${card.getAttribute('data-id')}`;
        });
      });
    } else {
      articlesGrid.innerHTML = '<p>Статьи появятся позже.</p>';
    }
    initScrollAnimation();
  });
</script>
</body>
</html>
