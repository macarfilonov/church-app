<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Духовенство | Храм Покрова Пресвятой Богородицы</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<header>...</header>
<main>
  <div class="container" style="max-width:1000px; margin:2rem auto;">
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> На главную</a>
    <h1>Духовенство храма</h1>
    <div id="clergyList" class="clergy-list"></div>
  </div>
</main>
<footer>...</footer>
<button class="back-to-top" id="backToTop">↑</button>
<script src="js/common.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    await loadCommonData();
    let html = '';
    clergyData.forEach(m => {
      html += `<div class="clergy-card"><img src="${m.photoUrl}" class="clergy-photo"><div><h3>${escapeHtml(m.name)}</h3><p><strong>${escapeHtml(m.position)}</strong></p><p>${escapeHtml(m.description).replace(/\n/g,'<br>')}</p></div></div>`;
    });
    document.getElementById('clergyList').innerHTML = html;
    initScrollAnimation();
  });
</script>
</body>
</html>
