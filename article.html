<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Статья | Храм Покрова Пресвятой Богородицы</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<header>...</header>
<main>
  <div class="container" style="max-width:1000px; margin:2rem auto;">
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> На главную</a>
    <h1 id="articleTitle"></h1>
    <div id="articleContent"></div>
  </div>
</main>
<footer>...</footer>
<button class="back-to-top" id="backToTop">↑</button>
<script src="js/common.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    await loadCommonData();
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');
    const article = articles.find(a => a.id === id);
    if (article) {
      document.getElementById('articleTitle').innerText = article.title;
      document.getElementById('articleContent').innerHTML = textToHtml(escapeHtml(article.content));
    } else {
      document.getElementById('articleTitle').innerText = 'Статья не найдена';
      document.getElementById('articleContent').innerHTML = '<p>Извините, такая статья не найдена.</p>';
    }
    initScrollAnimation();
  });
</script>
</body>
</html>
